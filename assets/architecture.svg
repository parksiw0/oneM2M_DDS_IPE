<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="860" height="360" fill="#ffffff"/>

  <!-- panels -->
  <rect x="30"  y="40" width="190" height="300" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="330" y="40" width="200" height="300" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="640" y="40" width="200" height="300" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>

  <!-- column titles -->
  <text x="125" y="68" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">ROS2 robot</text>
  <text x="430" y="68" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">IPE</text>
  <text x="740" y="68" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">oneM2M CSE (tinyIoT)</text>

  <!-- ROS2 interface labels -->
  <text x="125" y="124" text-anchor="middle" font-size="13" fill="#1e293b">topic</text>
  <text x="125" y="184" text-anchor="middle" font-size="13" fill="#1e293b">topic</text>
  <text x="125" y="244" text-anchor="middle" font-size="13" fill="#1e293b">service</text>
  <text x="125" y="304" text-anchor="middle" font-size="13" fill="#1e293b">action</text>

  <!-- IPE components -->
  <text x="430" y="124" text-anchor="middle" font-size="13" fill="#1e293b">observation pipeline</text>
  <text x="430" y="184" text-anchor="middle" font-size="13" fill="#1e293b">command dispatcher</text>
  <text x="430" y="244" text-anchor="middle" font-size="13" fill="#1e293b">transaction manager</text>
  <text x="430" y="304" text-anchor="middle" font-size="13" fill="#1e293b">transaction manager</text>

  <!-- oneM2M subtrees -->
  <text x="655" y="124" font-size="10.5" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#1e293b">ros2Data/&lt;robot&gt;/&lt;iface&gt;</text>
  <text x="655" y="184" font-size="10.5" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#1e293b">ros2Command/&lt;robot&gt;/&lt;iface&gt;</text>
  <text x="655" y="244" font-size="10.5" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#1e293b">services/&lt;robot&gt;/&lt;iface&gt;</text>
  <text x="655" y="304" font-size="10.5" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#1e293b">actions/&lt;robot&gt;/&lt;iface&gt;</text>

  <!-- arrows: ROS2 <-> IPE (gap 222..322) -->
  <line x1="224" y1="120" x2="320" y2="120" stroke="#475569" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="320" y1="180" x2="224" y2="180" stroke="#475569" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="224" y1="240" x2="320" y2="240" stroke="#475569" stroke-width="1.6" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <line x1="224" y1="300" x2="320" y2="300" stroke="#475569" stroke-width="1.6" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text x="272" y="112" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">observe</text>
  <text x="272" y="172" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">publish</text>
  <text x="272" y="232" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">req/resp</text>
  <text x="272" y="292" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">goal/fb</text>

  <!-- arrows: IPE <-> CSE (gap 538..638) -->
  <line x1="540" y1="120" x2="636" y2="120" stroke="#475569" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="636" y1="180" x2="540" y2="180" stroke="#475569" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="540" y1="240" x2="636" y2="240" stroke="#475569" stroke-width="1.6" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <line x1="540" y1="300" x2="636" y2="300" stroke="#475569" stroke-width="1.6" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text x="588" y="112" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">CIN</text>
  <text x="588" y="172" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">NOTIFY</text>
  <text x="588" y="232" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">req/resp</text>
  <text x="588" y="292" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">goal/result</text>
</svg>
