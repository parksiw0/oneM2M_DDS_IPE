# PX4 SITL — MVP configuration (5 topics: 2 FCNT + 3 CNT)
#
# FCNT (entities, SDT-backed, latest-state via PUT):
#   - battery_status_v1   -> r2d:bat
#   - vehicle_local_pos   -> r2d:lps
#
# CNT  (sensors/events, CIN historical):
#   - sensor_combined     -> downsampled 250Hz -> 5Hz
#   - vehicle_attitude    -> downsampled  50Hz -> 10Hz
#   - vehicle_status_v4   -> as-is (low rate)
#
# All /fmu/out/* topics use BEST_EFFORT + TRANSIENT_LOCAL QoS.

platform:
  name: px4
  description: "PX4 SITL drone via uXRCE-DDS Agent"
  message_packages:
    - px4_msgs

cse:
  endpoint: "http://localhost:3000"
  cse_base: TinyIoT
  ae_name: ros2-ipe
  protocol: http
  origin: CAdmin
  poa: "http://localhost:5050"

notification_server:
  host: "0.0.0.0"
  port: 5050

qos_profiles:
  px4_default:
    reliability: BEST_EFFORT
    durability: TRANSIENT_LOCAL
    history: KEEP_LAST
    depth: 5

topics:
  # === FCNT 1: battery ===
  - name: "/fmu/out/battery_status_v1"
    message_type: "px4_msgs/msg/BatteryStatus"
    qos_profile: px4_default
    semantic_category: entities
    resource_alias: battery
    representation_policy: latest_only
    timestamp_field: timestamp
    timestamp_format: px4_microseconds
    flexcontainer:
      type: "r2d:bat"
      cnd: "org.kor.ros2.drone.moduleclass.battery"
      field_map:
        vol: voltage_v
        cur: current_a
        rem: remaining
        cct: cell_count
        tmp: temperature

  # === FCNT 2: localPose ===
  - name: "/fmu/out/vehicle_local_position_v1"
    message_type: "px4_msgs/msg/VehicleLocalPosition"
    qos_profile: px4_default
    semantic_category: entities
    resource_alias: position
    representation_policy: latest_only
    timestamp_field: timestamp
    timestamp_format: px4_microseconds
    frame_convention: NED
    flexcontainer:
      type: "r2d:lps"
      cnd: "org.kor.ros2.drone.moduleclass.localPose"
      field_map:
        posX: x
        posY: y
        posZ: z
        velX: vx
        velY: vy
        velZ: vz
        hdg: heading

  # === CNT 1: IMU (sensor_combined) ===
  - name: "/fmu/out/sensor_combined"
    message_type: "px4_msgs/msg/SensorCombined"
    qos_profile: px4_default
    semantic_category: sensors
    resource_alias: imu
    representation_policy: sampled
    sampling:
      interval_sec: 0.2          # 250Hz -> 5Hz
    selected_fields:
      - gyro_rad
      - accelerometer_m_s2
    timestamp_field: timestamp
    timestamp_format: px4_microseconds

  # === CNT 2: attitude ===
  - name: "/fmu/out/vehicle_attitude"
    message_type: "px4_msgs/msg/VehicleAttitude"
    qos_profile: px4_default
    semantic_category: sensors
    resource_alias: attitude
    representation_policy: sampled
    sampling:
      interval_sec: 0.1          # 50Hz -> 10Hz
    selected_fields:
      - q
    timestamp_field: timestamp
    timestamp_format: px4_microseconds

  # === CNT 3: flightMode events ===
  - name: "/fmu/out/vehicle_status_v4"
    message_type: "px4_msgs/msg/VehicleStatus"
    qos_profile: px4_default
    semantic_category: events
    resource_alias: flightMode
    representation_policy: historical_only
    selected_fields:
      - nav_state
      - arming_state
      - failure_detector_status
    timestamp_field: timestamp
    timestamp_format: px4_microseconds

services: []
actions: []

recovery:
  retry_count: 3
  retry_delay_sec: 1.0
  on_failure: skip
